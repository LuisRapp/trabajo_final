version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rennova_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./rennova:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=rennova
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db
    ports:
      - "8000:80"

  db:
    image: postgres:15
    container_name: rennova_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rennova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
